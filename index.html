<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#reader {
  width: 320px;
  margin: 20px auto;
}
.result {
  font-size: 24px;
  margin-top: 20px;
  word-break: break-all;
}
.success { color: #00ff88; }
.error { color: #ff4444; }
.info { color: #ffaa00; }
</style>
</head>

<body>

<h2>QR SCAN</h2>
<div id="reader"></div>
<div id="result" class="result"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyGsBwlupZp6J3c2UEGwZMLWKT6Ofh2K5IyP2ovEvsm8A2TC-mCUAGx2rW3mzIYNAAs/exec";

let lastScan = "";
let queue = JSON.parse(localStorage.getItem("queue") || "[]");

// 音
function beep(success=true){
  let audio = new Audio(success
    ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
    : "https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

// バイブ
function vibrate(success=true){
  if (navigator.vibrate){
    navigator.vibrate(success ? [100,50,100] : [300]);
  }
}

// 表示
function show(msg, type="info"){
  const el = document.getElementById("result");
  el.innerText = msg;
  el.className = "result " + type;
}

// 送信（GET + 強化版）
function sendData(rawText){

  let pno = rawText.trim(); // ← 超重要

  if (!pno){
    show("NG: 空データ", "error");
    return;
  }

  let url = API_URL + "?pno=" + encodeURIComponent(pno);

  console.log("送信URL:", url); // ← デバッグ用

  fetch(url)
    .then(res => res.text())
    .then(data => {

      console.log("レスポンス:", data);

      if (data.includes("Success")) {
        show("OK: " + pno, "success");
        beep(true);
        vibrate(true);
      } else {
        show("NG: " + data, "error");
        beep(false);
        vibrate(false);
      }

    })
    .catch(err => {

      console.log("通信エラー:", err);

      queue.push(pno);
      localStorage.setItem("queue", JSON.stringify(queue));

      show("OFFLINE保存: " + pno, "error");
      vibrate(false);
    });
}

// 再送処理
function retryQueue(){

  if(queue.length === 0) return;

  console.log("再送開始:", queue);

  let copy = [...queue];
  queue = [];
  localStorage.setItem("queue", JSON.stringify(queue));

  copy.forEach(pno => {
    let url = API_URL + "?pno=" + encodeURIComponent(pno);
    fetch(url)
      .then(res => res.text())
      .then(data => {
        console.log("再送成功:", pno, data);
      })
      .catch(() => {
        console.log("再送失敗:", pno);
        queue.push(pno);
        localStorage.setItem("queue", JSON.stringify(queue));
      });
  });
}

// QR読み取り
function onScanSuccess(decodedText) {

  let pno = decodedText.trim();

  // 重複防止
  if(pno === lastScan) return;
  lastScan = pno;

  show("読取: " + pno, "info");

  sendData(pno);
}

// スキャナ起動
new Html5QrcodeScanner("reader", { fps: 10 }).render(onScanSuccess);

// 定期再送（5秒）
setInterval(retryQueue, 5000);

</script>

</body>
</html>
