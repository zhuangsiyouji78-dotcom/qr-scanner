<div id="status">待機中...</div>
<div id="log"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxaSdMBgbtt7PaM-p6Mp24JxvwmtYSyvsuJcpAjojkXMlxE-yxCAYwbvhjyneIm6nAq/exec";

function log(msg){
  console.log(msg);
  document.getElementById("log").innerHTML += "<br>" + msg;
}

function setStatus(msg){
  document.getElementById("status").innerText = msg;
  log("STATUS: " + msg);
}

// ★テスト送信関数
function testSend(){

  let pno = "TEST123";

  setStatus("🚀 送信中...");
  log("送信開始");

 fetch(API_URL, {
  method: "POST",
  body: JSON.stringify({ pno: pno })
})
     .then(res => {
    log("レスポンス受信");
    return res.json();
  })
  .then(data => {

    log("JSON解析OK");

    if (!data){
      setStatus("❌ データなし");
      return;
    }

    log("code: " + data.code);

    switch(data.code){
      case "OK":
        setStatus("🎉 SUCCESS");
        break;

      case "DUPLICATE":
        setStatus("⚠️ 既に登録済み");
        break;

      case "NOT_FOUND":
        setStatus("❌ 未登録");
        break;

      default:
        setStatus("⚠️ " + data.message);
    }

  })
  .catch(err => {
    log("通信エラー: " + err);
    setStatus("❌ OFFLINE");
  });
}

// ★ページ読み込み時にテスト
testSend();

</script>
